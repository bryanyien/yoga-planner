<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>課程出行規劃</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;
  --white:#ffffff;
  --card:#ffffff;
  --border:#e8e5df;
  --border2:#d5d1c8;
  --accent:#2d6a4f;
  --accent-light:#e8f5ef;
  --amber:#b5651d;
  --amber-light:#fdf3e7;
  --red:#c0392b;
  --red-light:#fdecea;
  --blue:#1a4a7a;
  --blue-light:#eaf1fb;
  --muted:#aaa89f;
  --sub:#888680;
  --text:#2a2925;
  --text2:#4a4842;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:48px}

/* TOP BAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;flex-direction:column;gap:1px}
.topbar-title{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.3px}
.topbar-sub{font-size:10px;color:var(--muted)}
.topbar-clock{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--text);letter-spacing:1px}

/* WEEK STRIP */
.week-strip{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.week-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 10px;border-radius:10px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;min-width:46px}
.day-pill:hover{background:var(--bg)}
.day-pill.active{background:var(--accent);border-color:var(--accent)}
.day-pill.has-class{border-color:var(--accent);background:var(--accent-light)}
.day-pill.active.has-class{background:var(--accent)}
.day-wd{font-size:10px;color:var(--sub);font-weight:500}
.day-pill.active .day-wd{color:rgba(255,255,255,0.8)}
.day-num{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:var(--text)}
.day-pill.active .day-num{color:#fff}
.day-dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
.day-pill.active .day-dot{background:rgba(255,255,255,0.7)}

/* SETTINGS */
.settings-wrap{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.setting-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.setting-label{font-size:10px;color:var(--muted);margin-bottom:6px;line-height:1.3}
.setting-row{display:flex;align-items:center;gap:6px}
.adj-btn{background:var(--bg);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:7px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.1s}
.adj-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
.adj-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--text);flex:1;text-align:center}
.adj-unit{font-size:11px;color:var(--muted)}

/* CLASS CARDS STRIP */
.class-strip{padding:0 16px 12px}
.strip-label{font-size:10px;color:var(--muted);letter-spacing:1.5px;font-weight:700;text-transform:uppercase;margin-bottom:8px;padding-top:12px}
.class-cards{display:flex;flex-direction:column;gap:6px}
.class-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:12px}
.class-card:hover{border-color:var(--accent);background:var(--accent-light)}
.class-card.selected{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px var(--accent-light)}
.class-time-badge{font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--text);min-width:50px}
.class-info{flex:1}
.class-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:1px}
.class-dur{font-size:11px;color:var(--sub)}
.class-select-indicator{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.class-card.selected .class-select-indicator{background:var(--accent);border-color:var(--accent)}
.check-mark{width:10px;height:10px;display:none}
.class-card.selected .check-mark{display:block;color:#fff;font-size:10px}

.no-class{text-align:center;padding:20px 0;font-size:13px;color:var(--muted)}

/* DIVIDER */
.divider{margin:0 16px;border:none;border-top:1px solid var(--border)}

/* TIMELINE */
.timeline{padding:12px 16px 0}
.tl-step{position:relative;padding-left:40px;padding-bottom:6px}
.tl-dot{position:absolute;left:8px;top:4px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1}
.tl-line{position:absolute;left:16px;top:22px;bottom:0;width:1px;background:var(--border2)}
.tl-step:last-child .tl-line{display:none}
.dot-home{background:var(--blue-light);border:1.5px solid var(--blue);color:var(--blue)}
.dot-train{background:var(--accent-light);border:1.5px solid var(--accent);color:var(--accent)}
.dot-bike{background:#fff8e1;border:1.5px solid #c49a00;color:#c49a00}
.dot-class{background:#fce4ec;border:1.5px solid #c2185b;color:#c2185b}

.tl-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:11px 13px;transition:border-color 0.15s}
.tl-card.c-green{border-color:#a8d8b9;background:var(--accent-light)}
.tl-card.c-amber{border-color:#f0c987;background:var(--amber-light)}
.tl-card.c-red{border-color:#e8a19a;background:var(--red-light)}
.tl-card.c-blue{border-color:#a8c4e8;background:var(--blue-light)}

.tl-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.tl-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text);line-height:1}
.tl-time-note{font-size:11px;color:var(--sub);margin-top:2px}
.tl-right{text-align:right;flex-shrink:0}
.tl-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:3px}
.b-train{background:#e8f5ef;color:var(--accent)}
.b-bike{background:#fff8e1;color:#a07800}
.b-walk{background:var(--blue-light);color:var(--blue)}
.b-class{background:#fce4ec;color:#c2185b}
.b-return{background:var(--bg);color:var(--sub)}
.tl-desc{font-size:11px;color:var(--sub);line-height:1.5}
.tl-desc strong{color:var(--text2);font-weight:500}

/* ALERT */
.alert{margin:10px 16px 0;border-radius:12px;padding:11px 14px;font-size:12px;line-height:1.6;display:flex;align-items:flex-start;gap:8px}
.alert-ok{background:var(--accent-light);border:1px solid #a8d8b9;color:var(--accent)}
.alert-warn{background:var(--amber-light);border:1px solid #f0c987;color:var(--amber)}
.alert-err{background:var(--red-light);border:1px solid #e8a19a;color:var(--red)}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}

/* SECTION LABEL */
.sec-label{padding:14px 16px 0;display:flex;align-items:center;gap:8px}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-text{font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:700;text-transform:uppercase;white-space:nowrap}

/* FOOTER */
.footer{margin-top:20px;text-align:center;font-size:10px;color:var(--muted);line-height:2;padding:0 16px}
</style>
</head>

<div id="alertBox"></div>

<!-- 去程 -->
<div class="sec-label">

  <div class="sec-line"></div>

<div class="timeline" id="goTimeline"><div class="no-class" style="padding:16px 0">請從上方選擇課程</div></div>

  CFG[key]=Math.max(1,Math.min(99,CFG[key]+delta));

// ── Week strip ──
function buildWeek(){
  const strip=document.getElementById('weekStrip');
  strip.innerHTML='';
  const today=new Date();
  const wd=['日','一','二','三','四','五','六'];
  for(let i=0;i<7;i++){
    const d=new Date(today);
    d.setDate(today.getDate()+i);
    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const hasClass=SCHEDULE.some(s=>s.date===ds);
    const isActive=ds===selectedDate;
    const pill=document.createElement('div');
    pill.className='day-pill'+(isActive?' active':'')+(hasClass?' has-class':'');
    pill.innerHTML=`<span class="day-wd">${i===0?'今天':wd[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>${hasClass?'<span class="day-dot"></span>':''}`;
    pill.onclick=()=>{ selectedDate=ds; selectedClass=null; buildWeek(); buildClassCards(); compute(); };
    strip.appendChild(pill);
  }
}

// ── Class cards ──
function buildClassCards(){
  const wrap=document.getElementById('classCards');
  const classes=SCHEDULE.filter(s=>s.date===selectedDate);
  if(!classes.length){
    wrap.innerHTML='<div class="no-class">今日無課程</div>';
    document.getElementById('goTimeline').innerHTML='<div class="no-class" style="padding:16px 0">今日無課程</div>';
    document.getElementById('returnTimeline').innerHTML='';
    document.getElementById('alertBox').innerHTML='';
    return;
  }
  wrap.innerHTML='';
  classes.forEach((c,i)=>{
    const isSelected=selectedClass&&selectedClass.name===c.name&&selectedClass.start===c.start;
    const card=document.createElement('div');
    card.className='class-card'+(isSelected?' selected':'');
    card.innerHTML=`
      <div class="class-time-badge">${c.start}</div>
      <div class="class-info">
        <div class="class-name">${c.name}</div>
        <div class="class-dur">${c.start} – ${c.end}，60 分鐘</div>
      </div>
      <div class="class-select-indicator"><span class="check-mark">✓</span></div>
    `;
    card.onclick=()=>{ selectedClass=c; buildClassCards(); compute(); };
    wrap.appendChild(card);
  });
  // auto-select first if none
  if(!selectedClass||!classes.find(c=>c.name===selectedClass.name&&c.start===selectedClass.start)){
    selectedClass=classes[0];
    buildClassCards();
  }
}

// ── Compute ──
function step(dotClass,dotLabel,cardClass,timeStr,noteStr,badgeHTML,descHTML,isLast){
  return `<div class="tl-step">
    <div class="tl-dot ${dotClass}">${dotLabel}</div>
    ${isLast?'':'<div class="tl-line"></div>'}
    <div class="tl-card ${cardClass}">
      <div class="tl-row">
        <div><div class="tl-time">${timeStr}</div><div class="tl-time-note">${noteStr}</div></div>
        <div class="tl-right">${badgeHTML}<div class="tl-desc">${descHTML}</div></div>
      </div>
    </div>
  </div>`;
}

function compute(){
  if(!selectedClass){
    document.getElementById('goTimeline').innerHTML='<div class="no-class" style="padding:16px 0">請選擇課程</div>';
    document.getElementById('returnTimeline').innerHTML='';
    document.getElementById('alertBox').innerHTML='';
    return;
  }
  const classMin=toMin(selectedClass.start);
  const now=nowMin();
  const isToday=selectedDate===todayStr();

  // ── 去程 ──
  const latestArrShanhua=classMin-CFG.bikeToYoga;
  let goTrain=null;
  for(const t of GO){ if(toMin(t.arr)<=latestArrShanhua) goTrain=t; }

  let goHTML='';
  if(!goTrain){
    goHTML='<div class="no-class" style="padding:16px 0;color:#c0392b">找不到能準時到達的班車，請調整設定</div>';
  } else {
    const trainDepMin=toMin(goTrain.dep);
    const mustAtStation=trainDepMin-CFG.boardBuffer;
    const leaveHome=mustAtStation-CFG.homeToStation;
    const bikeArrYoga=toMin(goTrain.arr)+CFG.bikeToYoga;
    const minsLeft=leaveHome-now;
    const bufferMin=classMin-bikeArrYoga;

    let homeCard='';
    if(!isToday) homeCard='';
    else if(minsLeft<0) homeCard='c-red';
    else if(minsLeft<=8) homeCard='c-amber';
    else homeCard='c-green';

    const minsNote=!isToday?`出門時間`
      :minsLeft>=0?`距現在還有 ${minsLeft} 分鐘`:`⚠ 已超過 ${Math.abs(minsLeft)} 分`;

    goHTML+=step('dot-home','🏠',homeCard,toHM(leaveHome),minsNote,
      `<span class="tl-badge b-walk">騎機車</span>`,
      `從<strong>藝術清園</strong>出發<br>→ 台南火車站後站`,false);
    goHTML+=step('dot-train','🚉','c-blue',toHM(mustAtStation),`搭 ${goTrain.dep} ${goTrain.type}`,
      `<span class="tl-badge b-train">${goTrain.type}</span>`,
      `台南站候車<br>約 12–28 分鐘抵善化`,false);
    goHTML+=step('dot-train','📍','',goTrain.arr,`抵達善化火車站`,
      `<span class="tl-badge b-bike">YouBike</span>`,
      `騎腳踏車 <strong>${CFG.bikeToYoga} 分鐘</strong><br>→ 瑜伽日記 建國路 140 號`,false);
    const yogaCard=bikeArrYoga<=classMin?'c-green':'c-red';
    const yogaNote=bikeArrYoga<=classMin?`提前 ${bufferMin} 分鐘抵達 ✓`:`晚 ${bikeArrYoga-classMin} 分鐘 ✗`;
    goHTML+=step('dot-class','🧘',yogaCard,toHM(bikeArrYoga),yogaNote,
      `<span class="tl-badge b-class">上課</span>`,
      `<strong>瑜伽日記</strong> 2F<br>${selectedClass.name}`,true);
  }
  document.getElementById('goTimeline').innerHTML=goHTML;

  // ── 回程 ──
  const classEndMin=classMin+60;
  const earliestDep=classEndMin+CFG.boardBuffer;
  let retTrain=null;
  for(const t of RETURN){ if(toMin(t.dep)>=earliestDep){ retTrain=t; break; } }

  let retHTML='';
  if(!retTrain){
    retHTML='<div class="no-class" style="padding:16px 0;color:#c0392b">今日已無回程班次</div>';
  } else {
    const retDepMin=toMin(retTrain.dep);
    const retArrMin=toMin(retTrain.arr);
    const youLeaveMin=retArrMin-CFG.stationToHome;
    const youLeaveLeft=youLeaveMin-now;

    retHTML+=step('dot-class','🧘','',toHM(classEndMin),'下課，前往善化車站',
      `<span class="tl-badge b-bike">YouBike</span>`,
      `騎腳踏車返回善化站<br>約 ${CFG.bikeToYoga} 分鐘`,false);
    retHTML+=step('dot-train','🚉','c-blue',retTrain.dep,`善化搭車`,
      `<span class="tl-badge b-train">${retTrain.type}</span>`,
      `約 16–21 分鐘抵台南`,false);
    retHTML+=step('dot-train','🚉','c-green',retTrain.arr,`抵達台南火車站後站`,
      `<span class="tl-badge b-return">後站出站</span>`,
      `家人到達台南`,false);

    const youCard=!isToday?'':(youLeaveLeft<0?'c-red':youLeaveLeft<=10?'c-amber':'c-green');
    const youNote=!isToday?`出門接人時間`
      :youLeaveLeft>=0?`距現在 ${youLeaveLeft} 分鐘後出發`:`⚠ 請立刻出發接人`;
    retHTML+=step('dot-home','🏠',youCard,toHM(youLeaveMin),youNote,
      `<span class="tl-badge b-walk">騎機車</span>`,
      `從<strong>藝術清園</strong>出發<br>→ 台南火車站後站接人`,true);
  }
  document.getElementById('returnTimeline').innerHTML=retHTML;

  // ── Alert ──
  let alertHTML='';
  if(goTrain&&isToday){
    const trainDepMin=toMin(goTrain.dep);
    const leaveHome=trainDepMin-CFG.boardBuffer-CFG.homeToStation;
    const minsLeft=leaveHome-now;
    if(minsLeft<0){
      alertHTML=`<div class="alert alert-err"><span class="alert-icon">⚠</span>已超過最晚出發時間，建議改搭下一班或調整課程。</div>`;
    } else if(minsLeft<=10){
      alertHTML=`<div class="alert alert-warn"><span class="alert-icon">⚡</span>距離出發只剩 <strong>${minsLeft} 分鐘</strong>，請準備出門！</div>`;
    } else {
      alertHTML=`<div class="alert alert-ok"><span class="alert-icon">✓</span>計畫正常，距出發還有 <strong>${minsLeft} 分鐘</strong>。</div>`;
    }
  }
  document.getElementById('alertBox').innerHTML=alertHTML;
}

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

buildWeek();
buildClassCards();
compute();
updateClock();
setInterval(()=>{ updateClock(); compute(); },30000);
</script>
</body>
